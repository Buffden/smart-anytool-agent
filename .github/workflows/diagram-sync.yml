name: Generate and Commit Diagrams

on:
  pull_request:
    paths:
      - '**/*.mmd'
      - '**/*.mermaid'
  push:
    branches: [main]
    paths:
      - '**/*.mmd'
      - '**/*.mermaid'
  workflow_dispatch:

jobs:
  diagrams:
    name: Generate Diagrams
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Mermaid CLI
        run: npm install -g @mermaid-js/mermaid-cli

      - name: Install diagram-sync
        run: npm install -g diagram-sync

      - name: Generate changed diagrams
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            diagram-sync
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -E '\.(mmd|mermaid)$' || true)
            if [ -n "$CHANGED" ]; then
              diagram-sync --files $CHANGED
            else
              echo "No diagram files changed."
            fi
          else
            CHANGED=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -E '\.(mmd|mermaid)$' || true)
            if [ -n "$CHANGED" ]; then
              diagram-sync --files $CHANGED
            else
              echo "No diagram files changed."
            fi
          fi

      - name: Upload diagram previews
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: diagrams-preview
          path: diagrams/

      - name: Commit generated diagrams
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add diagrams/
          if git diff --staged --quiet; then
            echo "No diagram changes to commit."
          else
            git commit -m "chore: auto-export diagrams [skip ci]"
            git push
          fi
